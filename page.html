<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Demo</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide">
        <style>
            body {
                font-family: "Audiowide", sans-serif;
            }
        </style>
    </head>
    <body>

    <audio src="Claire de lune.mp3"></audio>
         <div class="title_block">
            <h1>Welcome!</h1>
        </div>
        <div class="body_text">
            <h2>This is a short interactive demo. You can toggle audio using the button to the left, and you can use the slider below to control volume.
            </h2>
        </div>
        <button data-playing="false" role="switch" aria-checked="false" id="audioButton">
            <span>Toggle Audio</span>
        </button>
        <input type="range" id="volumeSlider" min="0" max="10" step="0.01" value="0">
        <script src="page.js"></script>
    </body>
</html>
